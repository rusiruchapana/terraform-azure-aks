name: Terraform Platform CI

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-format:
    name: Terraform Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check Terraform formatting
        run: |
          set -euo pipefail
          terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs:
      - terraform-format

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Define Terraform root directories
        run: |
          set -euo pipefail

          printf "%s\n" \
            "bootstrap/state-storage" \
            "environments/capstone-platform" \
            "environments/dev" \
            "environments/qa" \
            "environments/prod" \
            > /tmp/terraform-dirs.txt

          echo "Terraform root directories selected for validation:"
          cat /tmp/terraform-dirs.txt

      - name: Run terraform init and validate
        run: |
          set -euo pipefail

          while read -r dir; do
            echo
            echo "========================================"
            echo "Validating Terraform root directory: ${dir}"
            echo "========================================"

            terraform -chdir="${dir}" init -backend=false -input=false
            terraform -chdir="${dir}" validate
          done < /tmp/terraform-dirs.txt

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs:
      - terraform-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: Define Terraform root directories
        run: |
          set -euo pipefail

          printf "%s\n" \
            "bootstrap/state-storage" \
            "environments/capstone-platform" \
            "environments/dev" \
            "environments/qa" \
            "environments/prod" \
            > /tmp/terraform-dirs.txt

          echo "Terraform root directories selected for TFLint:"
          cat /tmp/terraform-dirs.txt

      - name: Run TFLint
        run: |
          set -euo pipefail

          while read -r dir; do
            echo
            echo "========================================"
            echo "Running TFLint in: ${dir}"
            echo "========================================"

            (
              cd "${dir}"
              tflint --init
              tflint
            )
          done < /tmp/terraform-dirs.txt

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    needs:
      - tflint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Checkov
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install checkov

      - name: Run Checkov IaC scan
        run: |
          set -euo pipefail

          checkov \
            --directory . \
            --framework terraform \
            --config-file .checkov.yml \
            --quiet \
            --skip-path .terraform \
            --skip-path .local-backups

  terraform-ci-summary:
    name: Terraform CI Summary
    runs-on: ubuntu-latest
    needs:
      - terraform-format
      - terraform-validate
      - tflint
      - checkov
    if: always()

    steps:
      - name: Write Terraform CI summary
        run: |
          {
            echo "# Terraform Platform CI Summary"
            echo
            echo "| Gate | Result | Purpose |"
            echo "|---|---|---|"
            echo "| Terraform Format | ${{ needs.terraform-format.result }} | Checks consistent Terraform formatting |"
            echo "| Terraform Validate | ${{ needs.terraform-validate.result }} | Runs init with backend disabled and validates Terraform root modules |"
            echo "| TFLint | ${{ needs.tflint.result }} | Finds Terraform linting and provider usage issues |"
            echo "| Checkov Security Scan | ${{ needs.checkov.result }} | Scans Terraform for IaC security and best-practice issues using the documented baseline |"
            echo
            echo "This workflow does not run terraform apply or terraform destroy."
          } >> "$GITHUB_STEP_SUMMARY"
