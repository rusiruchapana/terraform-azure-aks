apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: professional-gitops-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andrewferdinandus/aks-gitops-sample-app.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-sample-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
