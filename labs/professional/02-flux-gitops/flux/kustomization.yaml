apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: professional-gitops-demo
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 30s
  timeout: 2m
  prune: true
  targetNamespace: gitops-sample-dev
  sourceRef:
    kind: GitRepository
    name: professional-gitops-demo
  path: ./k8s/overlays/dev
  wait: true
