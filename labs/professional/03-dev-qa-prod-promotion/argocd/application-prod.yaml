apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promotion-demo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andrewferdinandus/terraform-azure-aks.git
    targetRevision: main
    path: gitops/apps/prod/promotion-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: promotion-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
