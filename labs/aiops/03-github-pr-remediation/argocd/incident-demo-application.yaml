apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-pr-incident-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andrewferdinandus/aks-gitops-sample-app.git
    targetRevision: aiops-lab-03-github-pr-remediation
    path: k8s/incident
  destination:
    server: https://kubernetes.default.svc
    namespace: incident-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
