apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andrewferdinandus/aks-gitops-sample-app.git
    targetRevision: main
    path: k8s/aiops-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
