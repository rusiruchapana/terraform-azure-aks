apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-demo
  namespace: beginner-registry
  labels:
    app: registry-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-demo
  template:
    metadata:
      labels:
        app: registry-demo
    spec:
      nodeSelector:
        workload: user
      containers:
        - name: registry-demo
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80

      # For private external registries, uncomment and update this section:
      #
      # imagePullSecrets:
      #   - name: registry-secret
