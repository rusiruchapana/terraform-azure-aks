apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-demo
  namespace: beginner-troubleshooting
  labels:
    app: selector-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-demo
  template:
    metadata:
      labels:
        app: selector-demo
    spec:
      nodeSelector:
        workload: user
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: selector-demo
  namespace: beginner-troubleshooting
spec:
  selector:
    app: wrong-label
  ports:
    - name: http
      port: 80
      targetPort: 80
