stages:
  - validate
  - build_push
  - deploy
  - verify

variables:
  IMAGE_NAME: gitlab-ci-demo
  APP_NAMESPACE: practitioner-gitlab-ci
  APP_DEPLOYMENT: gitlab-ci-demo
  APP_CONTAINER: web
  DOCKER_TLS_CERTDIR: "/certs"

validate:
  stage: validate
  image: alpine:3.21
  script:
    - test -f app/Dockerfile
    - test -f app/index.html
    - test -f k8s/namespace.yaml
    - test -f k8s/deployment.yaml
    - test -f k8s/service.yaml
    - grep -q "IMAGE_PLACEHOLDER" k8s/deployment.yaml

build_push:
  stage: build_push
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login "$REGISTRY_LOGIN_SERVER" -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
    - docker build -t "$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$CI_COMMIT_SHA" app
    - docker push "$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$CI_COMMIT_SHA"

deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:2.65.0
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - az aks get-credentials --resource-group "$AZURE_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing
    - az aks install-cli
    - IMAGE="$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$CI_COMMIT_SHA"
    - kubectl apply -f k8s/namespace.yaml
    - sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
    - kubectl apply -f k8s/service.yaml

verify:
  stage: verify
  image: mcr.microsoft.com/azure-cli:2.65.0
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - az aks get-credentials --resource-group "$AZURE_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing
    - az aks install-cli
    - kubectl rollout status deployment/$APP_DEPLOYMENT -n $APP_NAMESPACE
    - kubectl get pods -n $APP_NAMESPACE
    - kubectl get svc -n $APP_NAMESPACE
