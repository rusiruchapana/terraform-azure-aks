apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keyvault-demo-secrets
  namespace: practitioner-keyvault
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: AZURE_CLIENT_ID_PLACEHOLDER
    keyvaultName: KEYVAULT_NAME_PLACEHOLDER
    tenantId: AZURE_TENANT_ID_PLACEHOLDER
    objects: |
      array:
        - |
          objectName: demo-message
          objectType: secret
          objectVersion: ""
