apiVersion: v1
kind: Pod
metadata:
  name: keyvault-demo
  namespace: practitioner-keyvault
  labels:
    app: keyvault-demo
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: keyvault-reader
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Reading mounted Key Vault secret..."
          cat /mnt/secrets-store/demo-message
          echo
          sleep 3600
      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: keyvault-demo-secrets
