apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-lab-collector-config
  namespace: practitioner-otel
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        metrics:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - debug
            - prometheus
        traces:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - debug

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-lab-collector
  namespace: practitioner-otel
  labels:
    app: otel-lab-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-lab-collector
  template:
    metadata:
      labels:
        app: otel-lab-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.152.0
          args:
            - "--config=/etc/otelcol/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8889
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol
      volumes:
        - name: otel-config
          configMap:
            name: otel-lab-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-lab-collector
  namespace: practitioner-otel
  labels:
    app: otel-lab-collector
spec:
  type: ClusterIP
  selector:
    app: otel-lab-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8889
      targetPort: 8889
