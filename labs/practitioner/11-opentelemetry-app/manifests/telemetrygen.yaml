          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.152.0
          args:
            - metrics
            - --otlp-endpoint=otel-lab-collector.practitioner-otel.svc.cluster.local:4317
            - --otlp-insecure
            - --service=practitioner-otel-telemetrygen
