apiVersion: batch/v1
kind: Job
metadata:
  name: telemetrygen-traces
  namespace: practitioner-otel
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: telemetrygen-traces
    spec:
      restartPolicy: Never
      containers:
        - name: telemetrygen
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.152.0
          args:
            - traces
            - --otlp-endpoint=otel-lab-collector.practitioner-otel.svc.cluster.local:4317
            - --otlp-insecure
            - --service=practitioner-otel-telemetrygen
            - --traces=100
---
