name: Build and deploy to AKS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/**"
      - ".github/workflows/build-deploy-aks.yaml"

env:
  IMAGE_NAME: practitioner-github-actions
  APP_NAMESPACE: practitioner-github-actions
  APP_DEPLOYMENT: github-actions-demo
  APP_CONTAINER: web

jobs:
  validate:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          test -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/app/Dockerfile
          test -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/namespace.yaml
          test -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/deployment.yaml
          test -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/service.yaml

      - name: Check image placeholder exists
        run: |
          grep -q "IMAGE_PLACEHOLDER" terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/deployment.yaml

  build_push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Show image tag
        run: |
          echo "Image will be pushed with commit SHA tag."
          echo "Image name: ${{ env.IMAGE_NAME }}"
          echo "Registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/app
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs:
      - build_push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Deploy manifests
        run: |
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          if [ -z "$IMAGE" ]; then
            echo "ERROR: Image value is empty."
            exit 1
          fi

          echo "Deploying image with commit SHA tag."

          kubectl apply -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/namespace.yaml

          sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
            terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/deployment.yaml \
            | kubectl apply -f -

          kubectl apply -f terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s/service.yaml

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs:
      - deploy

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.APP_DEPLOYMENT }} \
            -n ${{ env.APP_NAMESPACE }}

      - name: Show deployed resources
        run: |
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
          kubectl get svc -n ${{ env.APP_NAMESPACE }}
