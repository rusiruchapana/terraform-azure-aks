name: DevSecOps checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "labs/practitioner/02-github-actions-devsecops/**"
      - ".github/workflows/devsecops-checks.yaml"
  push:
    branches:
      - main
permissions:
  contents: read
env:
  APP_PATH: labs/practitioner/02-github-actions-devsecops/app
  K8S_PATH: labs/practitioner/02-github-actions-devsecops/k8s
  IMAGE_NAME: practitioner-github-actions-devsecops
jobs:
  validate:
    name: Validate required files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f "${APP_PATH}/Dockerfile"
          test -f "${APP_PATH}/index.html"
          test -f "${K8S_PATH}/namespace.yaml"
          test -f "${K8S_PATH}/deployment.yaml"
          test -f "${K8S_PATH}/service.yaml"
      - name: Check image placeholder
          grep -q "IMAGE_PLACEHOLDER" "${K8S_PATH}/deployment.yaml"
  scan_filesystem:
    name: Scan files for vulnerabilities and secrets
    needs:
      - validate
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: labs/practitioner/02-github-actions-devsecops
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
  scan_config:
    name: Scan Dockerfile and Kubernetes YAML
      - name: Run Trivy config scan
          scan-type: config
  build_image:
    name: Build local image for scanning
      - scan_filesystem
      - scan_config
      - name: Build local Docker image
          docker build \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            "${APP_PATH}"
      - name: Save image as artifact
          docker save "${IMAGE_NAME}:${GITHUB_SHA}" -o image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
          name: devsecops-image
          path: image.tar
          retention-days: 1
  scan_image:
    name: Scan container image
      - build_image
      - name: Download image artifact
        uses: actions/download-artifact@v4
      - name: Load image
          docker load -i image.tar
      - name: Run Trivy image scan
          image-ref: practitioner-github-actions-devsecops:${{ github.sha }}
          ignore-unfixed: true
          exit-code: "1"
  summary:
    name: DevSecOps summary
      - scan_image
    if: always()
      - name: Show summary
          echo "DevSecOps checks completed."
          echo ""
          echo "This lab does not deploy to AKS."
          echo "It teaches security checks before deployment."
          echo "If scan_image failed, review HIGH or CRITICAL vulnerabilities before deploying."
