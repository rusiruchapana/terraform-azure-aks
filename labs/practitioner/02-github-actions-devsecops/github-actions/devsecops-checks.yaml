name: DevSecOps checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/**"
      - "terraform-azure-aks/labs/practitioner/02-github-actions-devsecops/**"
      - ".github/workflows/devsecops-checks.yaml"
  push:
    branches:
      - main
    paths:
      - "terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/**"
      - "terraform-azure-aks/labs/practitioner/02-github-actions-devsecops/**"
      - ".github/workflows/devsecops-checks.yaml"

permissions:
  contents: read

env:
  APP_PATH: terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/app
  K8S_PATH: terraform-azure-aks/labs/practitioner/01-github-actions-to-aks/k8s
  IMAGE_NAME: practitioner-github-actions-devsecops

jobs:
  validate:
    name: Validate required files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f "${APP_PATH}/Dockerfile"
          test -f "${APP_PATH}/index.html"
          test -f "${K8S_PATH}/namespace.yaml"
          test -f "${K8S_PATH}/deployment.yaml"
          test -f "${K8S_PATH}/service.yaml"

      - name: Check image placeholder
        run: |
          grep -q "IMAGE_PLACEHOLDER" "${K8S_PATH}/deployment.yaml"

  scan_filesystem:
    name: Scan files for vulnerabilities and secrets
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: terraform-azure-aks/labs/practitioner/01-github-actions-to-aks
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  scan_config:
    name: Scan Dockerfile and Kubernetes YAML
    runs-on: ubuntu-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: terraform-azure-aks/labs/practitioner/01-github-actions-to-aks
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  build_image:
    name: Build local image for scanning
    runs-on: ubuntu-latest
    needs:
      - scan_filesystem
      - scan_config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build local Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" \
            "${APP_PATH}"

      - name: Save image as artifact
        run: |
          docker save "${IMAGE_NAME}:${GITHUB_SHA}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-image
          path: image.tar
          retention-days: 1

  scan_image:
    name: Scan container image
    runs-on: ubuntu-latest
    needs:
      - build_image

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: devsecops-image

      - name: Load image
        run: |
          docker load -i image.tar

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: practitioner-github-actions-devsecops:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  summary:
    name: DevSecOps summary
    runs-on: ubuntu-latest
    needs:
      - scan_filesystem
      - scan_config
      - scan_image
    if: always()

    steps:
      - name: Show summary
        run: |
          echo "DevSecOps checks completed."
          echo ""
          echo "This lab does not deploy to AKS."
          echo "It teaches security checks before deployment."
          echo ""
          echo "If scan_image failed, review HIGH or CRITICAL vulnerabilities before deploying."
