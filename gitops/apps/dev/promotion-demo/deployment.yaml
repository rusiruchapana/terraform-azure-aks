apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-demo
  namespace: promotion-dev
  labels:
    app: promotion-demo
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promotion-demo
      environment: dev
  template:
    metadata:
      labels:
        app: promotion-demo
        environment: dev
    spec:
      nodeSelector:
        workload: user
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: content
          configMap:
            name: promotion-demo-content
